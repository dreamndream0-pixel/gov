# 完整升級版 HTML（已修正政府採購網連結 + 新增招標類別篩選）

```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>標案探勘 · Tender Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --surface-soft: #f4f3ee;
  --border: #e8e6df;
  --border-strong: #c9c5b8;
  --text: #1c1c1a;
  --text-soft: #5a5852;
  --text-faint: #8e8b80;
  --accent: #b91c1c;
  --accent-soft: #fef2f2;
  --tender: #1e40af;
  --tender-soft: #eff6ff;
  --award: #166534;
  --award-soft: #f0fdf4;
  --radius: 6px;
  --radius-sm: 4px;
  --serif: 'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

.topbar {
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 20;
}

.brand {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
}

.brand span {
  color: var(--accent);
}

.layout {
  display: grid;
  grid-template-columns: 320px 1fr;
}

.sidebar {
  border-right: 1px solid var(--border);
  background: white;
  min-height: calc(100vh - 64px);
  padding: 24px;
  position: sticky;
  top: 64px;
}

.main {
  padding: 32px;
}

.section {
  margin-bottom: 24px;
}

.label {
  display: block;
  margin-bottom: 8px;
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-family: var(--mono);
}

.input,
.select {
  width: 100%;
  padding: 11px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: white;
  font-size: 14px;
}

.input:focus,
.select:focus {
  outline: none;
  border-color: var(--text);
}

.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}

.btn-primary {
  background: var(--text);
  color: white;
}

.btn-primary:hover {
  background: black;
}

.page-title {
  font-family: var(--serif);
  font-size: 36px;
  margin-bottom: 28px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 14px;
  margin-bottom: 28px;
}

.stat {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-faint);
  margin-bottom: 6px;
  font-family: var(--mono);
}

.stat-value {
  font-size: 30px;
  font-family: var(--serif);
}

.results {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}

.result-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-soft);
}

.card {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.card:hover {
  background: #fafafa;
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.tag {
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--mono);
}

.tag-award {
  background: var(--award-soft);
  color: var(--award);
}

.tag-tender {
  background: var(--tender-soft);
  color: var(--tender);
}

.amount {
  margin-left: auto;
  font-family: var(--mono);
}

.title {
  font-size: 19px;
  line-height: 1.5;
  font-family: var(--serif);
  margin-bottom: 8px;
}

.unit {
  color: var(--text-soft);
  font-size: 14px;
}

.links {
  margin-top: 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.link-btn {
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
}

.link-btn:hover {
  background: var(--surface-soft);
}

.empty {
  padding: 80px 20px;
  text-align: center;
  color: var(--text-soft);
}

@media(max-width: 980px){
  .layout {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    min-height: auto;
  }

  .stats {
    grid-template-columns: repeat(2,1fr);
  }
}

@media(max-width: 560px){
  .stats {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">標案探勘<span>.</span></div>
</header>

<div class="layout">

<aside class="sidebar">

  <div class="section">
    <label class="label">主要關鍵字</label>
    <input id="query" class="input" value="資訊">
  </div>

  <div class="section">
    <label class="label">必須包含</label>
    <input id="include" class="input" placeholder="資訊,系統">
  </div>

  <div class="section">
    <label class="label">排除關鍵字</label>
    <input id="exclude" class="input" value="維護,保養">
  </div>

  <div class="section">
    <label class="label">機關名稱</label>
    <input id="unit" class="input" placeholder="臺中">
  </div>

  <div class="section">
    <label class="label">公告類型</label>
    <select id="type" class="select">
      <option value="all">全部</option>
      <option value="tender">招標</option>
      <option value="award">決標</option>
    </select>
  </div>

  <div class="section">
    <label class="label">招標類別</label>
    <select id="category" class="select">
      <option value="">全部</option>
      <option value="公開招標">公開招標</option>
      <option value="限制性招標">限制性招標</option>
      <option value="公開取得報價">公開取得報價</option>
      <option value="公開評選">公開評選</option>
      <option value="最有利標">最有利標</option>
    </select>
  </div>

  <div class="section">
    <label class="label">抓取頁數</label>
    <select id="pages" class="select">
      <option value="1">1頁</option>
      <option value="3" selected>3頁</option>
      <option value="5">5頁</option>
      <option value="10">10頁</option>
    </select>
  </div>

  <button class="btn btn-primary" id="btn-search">
    開始搜尋
  </button>

</aside>

<main class="main">

  <h1 class="page-title">政府標案探勘</h1>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">符合條件</div>
      <div class="stat-value" id="s-total">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">招標公告</div>
      <div class="stat-value" id="s-tender">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">決標公告</div>
      <div class="stat-value" id="s-award">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">總金額</div>
      <div class="stat-value" id="s-amount">0</div>
    </div>
  </div>

  <div class="results">
    <div class="result-head">
      搜尋結果
    </div>

    <div id="result-body">
      <div class="empty">
        請開始搜尋標案
      </div>
    </div>
  </div>

</main>

</div>

<script>
const API = 'https://pcc-api.openfun.app/api/searchbytitle';

const $ = id => document.getElementById(id);

function parseList(str){
  return str.split(',').map(v => v.trim()).filter(Boolean);
}

function money(n){
  n = Number(n || 0);

  if(n >= 100000000){
    return 'NT$ ' + (n/100000000).toFixed(2) + ' 億';
  }

  if(n >= 10000){
    return 'NT$ ' + (n/10000).toFixed(1) + ' 萬';
  }

  return 'NT$ ' + n.toLocaleString();
}

function totalMoney(n){
  n = Number(n || 0);

  if(n >= 100000000){
    return (n/100000000).toFixed(1) + '億';
  }

  if(n >= 10000){
    return Math.round(n/10000).toLocaleString() + '萬';
  }

  return n.toLocaleString();
}

function fmtDate(raw){
  raw = String(raw || '');

  if(raw.length === 8){
    return raw.slice(0,4) + '.' + raw.slice(4,6) + '.' + raw.slice(6,8);
  }

  return raw;
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

async function fetchPage(query,page){
  const url = `${API}?query=${encodeURIComponent(query)}&page=${page}`;

  const res = await fetch(url);

  if(!res.ok){
    throw new Error('API Error');
  }

  return await res.json();
}

async function search(){

  const query = $('query').value.trim();
  const include = parseList($('include').value);
  const exclude = parseList($('exclude').value);
  const unit = $('unit').value.trim();
  const type = $('type').value;
  const category = $('category').value;
  const pages = parseInt($('pages').value);

  if(!query){
    alert('請輸入關鍵字');
    return;
  }

  $('result-body').innerHTML = `
    <div class="empty">
      搜尋中...
    </div>
  `;

  let all = [];

  try {

    const jobs = [];

    for(let p=1; p<=pages; p++){
      jobs.push(fetchPage(query,p));
    }

    const results = await Promise.all(jobs);

    results.forEach(data => {
      all = all.concat(data.records || []);
    });

  } catch(e){

    $('result-body').innerHTML = `
      <div class="empty">
        API 抓取失敗\n<br><br>
        可能是政府資料暫時忙碌
      </div>
    `;

    return;
  }

  const filtered = all.filter(rec => {

    const brief = rec.brief || {};

    const title = brief.title || '';
    const recType = brief.type || '';
    const unitName = rec.unit_name || '';

    const isAward = recType.includes('決標');

    if(type === 'tender' && isAward) return false;
    if(type === 'award' && !isAward) return false;

    if(category && !recType.includes(category)){
      return false;
    }

    for(const w of include){
      if(!title.includes(w)) return false;
    }

    for(const w of exclude){
      if(title.includes(w)) return false;
    }

    if(unit && !unitName.includes(unit)){
      return false;
    }

    return true;
  });

  const mapped = filtered.map(rec => {

    const brief = rec.brief || {};

    const typeRaw = brief.type || '';

    const isAward = typeRaw.includes('決標');

    const amount = Number(
      brief?.companies?.amount ||
      brief?.amount ||
      0
    );

    const title = brief.title || '(無標題)';

    const govSearchUrl =
      'https://web.pcc.gov.tw/prkms/tender/common/basic/searchTenderBasic?searchMode=true&searchType=basic';

    const viewerUrl =
      `https://openfunltd.github.io/pcc-viewer/tender.html?unit_id=${encodeURIComponent(rec.unit_id || '')}&job_number=${encodeURIComponent(rec.job_number || '')}`;

    return {
      title,
      amount,
      type: isAward ? 'award' : 'tender',
      typeLabel: isAward ? '決標' : '招標',
      date: rec.date || '',
      unit: rec.unit_name || '',
      govSearchUrl,
      viewerUrl,
      typeRaw,
      jobNumber: rec.job_number || ''
    };
  });

  render(mapped);
}

function render(rows){

  $('s-total').textContent = rows.length.toLocaleString();
  $('s-tender').textContent = rows.filter(v=>v.type==='tender').length.toLocaleString();
  $('s-award').textContent = rows.filter(v=>v.type==='award').length.toLocaleString();

  const total = rows.reduce((s,v)=>s+v.amount,0);
  $('s-amount').textContent = totalMoney(total);

  if(rows.length === 0){
    $('result-body').innerHTML = `
      <div class="empty">
        找不到符合條件的標案
      </div>
    `;

    return;
  }

  $('result-body').innerHTML = rows.map(r => `

    <div class="card">

      <div class="card-top">

        <span class="tag tag-${r.type}">
          ${r.typeLabel}
        </span>

        <span>
          ${fmtDate(r.date)}
        </span>

        <span class="amount">
          ${r.amount ? money(r.amount) : ''}
        </span>

      </div>

      <div class="title">
        ${escapeHtml(r.title)}
      </div>

      <div class="unit">
        ${escapeHtml(r.unit)}
      </div>

      <div style="margin-top:10px;color:#777;font-size:13px;">
        ${escapeHtml(r.typeRaw)}
      </div>

      <div class="links">

        <a class="link-btn"
           href="${r.viewerUrl}"
           target="_blank">
           查看完整標案資料
        </a>

        <a class="link-btn"
           href="${r.govSearchUrl}"
           target="_blank"
           onclick="copyTender('${encodeURIComponent(r.title)}')">
           前往政府採購網搜尋
        </a>

      </div>

    </div>

  `).join('');
}

function copyTender(title){

  const decoded = decodeURIComponent(title);

  navigator.clipboard.writeText(decoded)
    .then(() => {
      setTimeout(() => {
        alert('已複製標案名稱，請直接貼到政府採購網搜尋');
      }, 100);
    });
}

$('btn-search').addEventListener('click', search);

window.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    search();
  }
});
</script>

</body>
</html>
```
